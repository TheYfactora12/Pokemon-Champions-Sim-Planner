name: Showdown Sync

on:
  schedule:
    - cron: '30 13 * * *'
  workflow_dispatch:
    inputs:
      write_db:
        description: 'Write normalized Showdown rows to Supabase'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      approve:
        description: 'Mark written showdown_entities rows approved immediately'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: read

concurrency:
  group: showdown-sync
  cancel-in-progress: true

jobs:
  fetch:
    name: Fetch Showdown source hashes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore previous entity hash baseline
        uses: actions/cache/restore@v4
        with:
          path: poke-sim/artifacts/showdown-sync-cache/entity_hashes.json
          key: showdown-sync-entity-hashes-${{ github.run_id }}
          restore-keys: |
            showdown-sync-entity-hashes-

      - name: Fetch upstream Showdown data
        run: |
          set -euo pipefail
          cd poke-sim
          if [ -f artifacts/showdown-sync-cache/entity_hashes.json ]; then
            npm run showdown:sync -- --previous=artifacts/showdown-sync-cache/entity_hashes.json
          else
            npm run showdown:sync
          fi

      - name: Dry-run DB row promotion
        run: |
          set -euo pipefail
          cd poke-sim
          npm run showdown:write-db -- --dry-run

      - name: Evaluate Showdown changes
        id: change_check
        run: |
          set -euo pipefail
          cd poke-sim
          node --input-type=module <<'NODE'
          import fs from 'node:fs';

          const summary = JSON.parse(fs.readFileSync('artifacts/showdown-sync/normalized/change_summary.json', 'utf8'));
          const totals = summary.totals || {};
          const changedKinds = Object.entries(totals).filter(([, row]) => ((row.added || 0) + (row.removed || 0) + (row.changed || 0)) > 0);
          const totalChanges = changedKinds.reduce((acc, [, row]) => acc + (row.added || 0) + (row.removed || 0) + (row.changed || 0), 0);
          const changedKindsLabel = changedKinds.map(([kind]) => kind).join(',');
          const output = [
            `has_changes=${totalChanges > 0}`,
            `total_changes=${totalChanges}`,
            `changed_kinds=${changedKindsLabel}`
          ].join('\n');

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `${output}\n`);
          console.log(output);
          NODE

      - name: Skip DB writes when nothing changed
        if: ${{ steps.change_check.outputs.has_changes != 'true' }}
        run: echo "No Showdown entity changes detected; skipping Supabase writes."

      - name: Write unapproved Showdown rows to Supabase
        if: ${{ env.SUPABASE_URL != '' && env.SUPABASE_SERVICE_ROLE_KEY != '' && steps.change_check.outputs.has_changes == 'true' && github.event_name == 'workflow_dispatch' && github.event.inputs.write_db == 'true' && github.event.inputs.approve != 'true' }}
        run: |
          set -euo pipefail
          cd poke-sim
          npm run showdown:write-db -- --sync-run-id "showdown_${GITHUB_RUN_ID}"

      - name: Write approved Showdown rows to Supabase
        if: ${{ env.SUPABASE_URL != '' && env.SUPABASE_SERVICE_ROLE_KEY != '' && steps.change_check.outputs.has_changes == 'true' && (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.write_db == 'true' && github.event.inputs.approve == 'true')) }}
        run: |
          set -euo pipefail
          cd poke-sim
          npm run showdown:write-db -- --sync-run-id "showdown_${GITHUB_RUN_ID}" --approve

      - name: Save latest entity hash baseline
        run: |
          set -euo pipefail
          mkdir -p poke-sim/artifacts/showdown-sync-cache
          cp poke-sim/artifacts/showdown-sync/normalized/entity_hashes.json \
            poke-sim/artifacts/showdown-sync-cache/entity_hashes.json

      - name: Upload sync artifacts
        uses: actions/upload-artifact@v4
        with:
          name: showdown-sync-${{ github.run_id }}
          path: |
            poke-sim/artifacts/showdown-sync/report.json
            poke-sim/artifacts/showdown-sync/source_files.json
            poke-sim/artifacts/showdown-sync/normalized/entities.json
            poke-sim/artifacts/showdown-sync/normalized/entity_hashes.json
            poke-sim/artifacts/showdown-sync/normalized/change_summary.json
            poke-sim/artifacts/showdown-sync/normalized/validation_findings.json
            poke-sim/artifacts/showdown-sync/raw/
          retention-days: 14

      - name: Cache latest entity hash baseline
        uses: actions/cache/save@v4
        if: always()
        with:
          path: poke-sim/artifacts/showdown-sync-cache/entity_hashes.json
          key: showdown-sync-entity-hashes-${{ github.run_id }}
