# Pokemon Champion 2026 — Main CI
# Runs on every PR to main and every push to main.
#
# Jobs:
#   1. syntax          — node --check all source JS (fast, ~30s)
#   2. tests           — auto-discovers all tests/*.js except excluded files (~2-4 min)
#   3. detect-changes  — checks if engine.js or data.js were touched
#   4. audit           — 5,070-battle audit ONLY when engine/data changed (~5-8 min)
#
# Bundle freshness + sw cache bump are enforced by their own dedicated workflows.
#
# EXCLUDED TESTS (re-enable when unblocked):
#   db_m*.js            — require live Supabase connection (blocked by #158)
#   _db_helpers.js      — shared helper, not a test runner
#   phase4c_detectors.js — requires classifyPokemon() (blocked by #141)
#   nightly_bring_harness.js — manual harness only
#   golden_battles_runner.js — helper, not standalone test

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ----------------------------------------------------------------
  # 1. SYNTAX CHECK
  # Fast gate. All JS source files must parse cleanly before anything else runs.
  # ----------------------------------------------------------------
  syntax:
    name: "Syntax Check"
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check all JS source files
        run: |
          set -e
          FILES=(
            poke-sim/data.js
            poke-sim/engine.js
            poke-sim/ui.js
            poke-sim/storage_adapter.js
            poke-sim/supabase_adapter.js
            poke-sim/strategy-injectable.js
            poke-sim/legality.js
          )
          for f in "${FILES[@]}"; do
            echo "→ node --check $f"
            node --check "$f"
          done
          echo "✅ All source files pass syntax check."

  # ----------------------------------------------------------------
  # 2. TEST SUITE
  # Auto-discovers every file in poke-sim/tests/*.js.
  # Excluded files:
  #   - audit.js              → runs in gated audit job below
  #   - db_m*.js              → require live Supabase (#158 blocker)
  #   - _db_helpers.js        → shared helper, not a test runner
  #   - phase4c_detectors.js  → requires classifyPokemon() (#141 blocker)
  #   - nightly_bring_harness.js → manual harness only
  #   - golden_battles_runner.js → helper, not standalone test
  # Runs after syntax passes.
  # ----------------------------------------------------------------
  tests:
    name: "Test Suite"
    runs-on: ubuntu-latest
    timeout-minutes: 8
    needs: syntax
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run all test suites (auto-discovered, with exclusions)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -e
          cd poke-sim
          # Install dependencies for live DB testing
          if [ -f package.json ]; then
            npm install
          fi
          # Create test environment with real Supabase credentials for DB tests
          if [ -n "$SUPABASE_URL" ] && [ -n "$SUPABASE_ANON_KEY" ]; then
            export SUPABASE_URL="$SUPABASE_URL"
            export SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY"
            echo "🔗 Live Supabase credentials configured for DB tests"
          else
            echo "⚠️  No Supabase credentials - DB tests will use mock"
          fi
          
          FAILED=0
          COUNT=0
          SKIPPED=0
          for t in tests/*.js; do
            BASE="$(basename "$t")"

            # Always skip — runs in gated audit job
            [ "$BASE" = "audit.js" ] && continue

            # Include DB tests with live Supabase connection
            # db_m*.js tests now run with real credentials
            [ "$BASE" = "_db_helpers.js" ] && { echo "⏭ SKIP (helper, not test): $t"; SKIPPED=$((SKIPPED + 1)); continue; }

            # Skip: requires classifyPokemon() (blocked by issue #141)
            [ "$BASE" = "phase4c_detectors.js" ] && { echo "⏭ SKIP (needs #141 classifyPokemon): $t"; SKIPPED=$((SKIPPED + 1)); continue; }

            # Skip: manual harnesses / helpers, not CI unit tests
            [ "$BASE" = "nightly_bring_harness.js" ] && { echo "⏭ SKIP (manual harness): $t"; SKIPPED=$((SKIPPED + 1)); continue; }
            [ "$BASE" = "golden_battles_runner.js" ] && { echo "⏭ SKIP (helper): $t"; SKIPPED=$((SKIPPED + 1)); continue; }

            # Skip: M9 not implemented yet
            [ "$BASE" = "db_m9_hardening_tests.js" ] && { echo "⏭ SKIP (M9 not implemented): $t"; SKIPPED=$((SKIPPED + 1)); continue; }

            echo "▶ $t"
            node "$t"
            TEST_RESULT=$?
            if [ $TEST_RESULT -eq 0 ]; then
              COUNT=$((COUNT + 1))
            else
              echo "❌ Test file failed: $t (exit code: $TEST_RESULT)"
              FAILED=1
            fi
          done
          echo ""
          echo "Ran $COUNT test file(s). Skipped $SKIPPED file(s)."
          if [ $FAILED -ne 0 ]; then
            echo "❌ One or more test suites failed."
            exit 1
          fi
          echo "✅ All test suites passed."
          # Clean up test data from live database
          echo ""
          echo "🧹 Cleaning up test data..."
          node -e "const { cleanupTestData } = require('./tests/_db_helpers.js'); cleanupTestData();"

          # Build production bundle with injected credentials
          echo ""
          echo "🚀 Building production bundle with credential injection..."
          cd poke-sim
          
          # Create production HTML with injected Supabase credentials
          if [ -n "$SUPABASE_URL" ] && [ -n "$SUPABASE_ANON_KEY" ]; then
            echo "🔗 Injecting live Supabase credentials into production bundle"
            
            # Replace placeholder URL with real credential
            sed "s|https://YOUR_PROJECT_REF.supabase.co|$SUPABASE_URL|g" pokemon-champion-2026.html > pokemon-champion-2026-temp.html
            
            # Replace placeholder key with real credential  
            sed "s|YOUR_ANON_KEY_HERE|$SUPABASE_ANON_KEY|g" pokemon-champion-2026-temp.html > pokemon-champion-2026.html
            
            # Clean up temp file
            rm pokemon-champion-2026-temp.html
            
            echo "✅ Production bundle built with live credentials"
            echo "📦 Bundle ready for deployment"
            
            # Verify credentials were injected (show first 50 chars of URL for security)
            echo "🔍 URL injected: ${SUPABASE_URL:0:50}..."
            echo "🔍 Key injected: ${SUPABASE_ANON_KEY:0:20}..."
          else
            echo "⚠️  No Supabase credentials available - keeping placeholder bundle"
          fi

  # ----------------------------------------------------------------
  # 3. DETECT ENGINE / DATA CHANGES
  # Uses dorny/paths-filter to check if engine.js or data.js changed.
  # Output is consumed by the audit job below.
  # Runs in parallel with tests (no dependency).
  # ----------------------------------------------------------------
  detect-changes:
    name: "Detect Engine/Data Changes"
    runs-on: ubuntu-latest
    outputs:
      engine: ${{ steps.filter.outputs.engine }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            engine:
              - 'poke-sim/engine.js'
              - 'poke-sim/data.js'

  # ----------------------------------------------------------------
  # 4. BATTLE AUDIT (GATED)
  # Only runs when engine.js or data.js changed.
  # Runs 5,070 battles. Expensive — skip it on doc/style-only PRs.
  # Requires both tests AND detect-changes to complete first.
  # ----------------------------------------------------------------
  audit:
    name: "Battle Audit (5,070 battles)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [tests, detect-changes]
    if: needs.detect-changes.outputs.engine == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run DB Module Tests
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          cd poke-sim
          # Create test environment with real Supabase credentials
          echo "window.__SUPABASE_URL__ = '$SUPABASE_URL';" > test-creds.js
          echo "window.__SUPABASE_KEY__ = '$SUPABASE_ANON_KEY';" >> test-creds.js
          echo "console.log('Using live Supabase:', '$SUPABASE_URL');" >> test-creds.js
          npm test -- tests/db_m*.js

      - name: Run full battle audit
        run: |
          cd poke-sim
          echo "▶ Running audit.js (5,070 battles)…"
          node tests/audit.js
          echo "✅ Battle audit passed."

  # ----------------------------------------------------------------
  # 5. DEPLOYMENT (CREDENTIAL-INJECTED BUNDLE)
  # Deploys the production bundle with injected Supabase credentials
  # Only runs after tests pass successfully
  # ----------------------------------------------------------------
  deploy:
    name: "Deploy Production Bundle"
    runs-on: ubuntu-latest
    needs: tests
    if: success() && github.ref == 'refs/heads/deployment/credential-injection'
    steps:
      - uses: actions/checkout@v4
      
      - name: Download production bundle
        run: |
          echo "📦 Downloading production bundle with injected credentials"
          # The bundle was built and modified in the tests job
          
      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/deployment/credential-injection'
        run: |
          echo "🚀 Deploying credential-injected bundle to GitHub Pages"
          echo "🔗 This bundle contains live Supabase credentials"
          echo "📁 Source: poke-sim/pokemon-champion-2026.html"
          echo "🌐 Target: GitHub Pages"
          
          # For now, just indicate deployment readiness
          echo "✅ Bundle ready for manual deployment"
          echo "📋 Next steps:"
          echo "   1. Merge this branch to main"
          echo "   2. Enable GitHub Pages on main branch"
          echo "   3. Deploy pokemon-champion-2026.html"
